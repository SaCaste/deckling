  ICONS = {
    heart:'M12 21s-7.4-4.7-7.4-10.4A4.6 4.6 0 0 1 12 6.1a4.6 4.6 0 0 1 7.4 4.5C19.4 16.3 12 21 12 21z',
    star:'M12 3l2.5 5.5 6 .6-4.5 4 1.3 5.9L12 16.9 6.2 19l1.3-5.9-4.5-4 6-.6z',
    shield:'M12 3l7 2.4v5.4c0 4.5-3 7.9-7 9.6-4-1.7-7-5.1-7-9.6V5.4z',
    sword:'M6 3l4.5 4.5 6 6 1.4-1.4 1.6 1.6-1 1 1 1-2 2-1-1-1 1-1.6-1.6 1.4-1.4-6-6L4.6 4.4 6 3zM4 16.5l3.5 3.5-1.5.5-2-.5-.5-2 .5-1.5z',

    flame:'M13 2c.5 3-2 4.5-2 7 0 1 .8 1.8 1.8 1.8 1.5 0 2.2-1.3 2.2-1.3.7 1 1 2 1 3.2A6 6 0 0 1 6 16c0-3.6 3-5.5 4-8 .6-1.5.4-4 3-6z',
    skull:'M12 2.5A8 8 0 0 0 6.5 16.4V19a1.5 1.5 0 0 0 1.5 1.5h1V18h1v2.5h4V18h1v2.5h1A1.5 1.5 0 0 0 17.5 19v-2.6A8 8 0 0 0 12 2.5zM9 11.5a1.6 1.6 0 1 1 0 3.2 1.6 1.6 0 0 1 0-3.2zm6 0a1.6 1.6 0 1 1 0 3.2 1.6 1.6 0 0 1 0-3.2z',
    crown:'M3 8l3.7 2.8L12 5l5.3 5.8L21 8l-1.6 11H4.6z',
    bolt:'M13 2L4 14h6l-1 8 9-12h-6z',
    drop:'M12 3c3 4 6 7 6 10.2A6 6 0 0 1 6 13.2C6 10 9 7 12 3z',
    leaf:'M5 19C5 9.5 11 5 19.5 5c0 9.5-6 14-14.5 14z',
    spade:'M12 3.2c-1 4-7 6-7 10A4 4 0 0 0 11.2 16C11 18 10.4 19.4 9 20.5h6c-1.4-1.1-2-2.5-2.2-4.5A4 4 0 0 0 19 13.2c0-4-6-6-7-10z',
    club:'M12 3a3 3 0 0 1 2.6 4.5A3 3 0 1 1 14.8 13c.1 2.6.9 4.3 2.4 5.5H6.8c1.5-1.2 2.3-2.9 2.4-5.5A3 3 0 1 1 9.4 7.5 3 3 0 0 1 12 3z',
    diamond:'M12 2.5l7 9.5-7 9.5-7-9.5z',
    dice:'M5 3.5h14a1.5 1.5 0 0 1 1.5 1.5v14a1.5 1.5 0 0 1-1.5 1.5H5A1.5 1.5 0 0 1 3.5 19V5A1.5 1.5 0 0 1 5 3.5zM8 7.2a1.3 1.3 0 1 0 0 2.6 1.3 1.3 0 0 0 0-2.6zm8 0a1.3 1.3 0 1 0 0 2.6 1.3 1.3 0 0 0 0-2.6zM12 10.7a1.3 1.3 0 1 0 0 2.6 1.3 1.3 0 0 0 0-2.6zM8 14.2a1.3 1.3 0 1 0 0 2.6 1.3 1.3 0 0 0 0-2.6zm8 0a1.3 1.3 0 1 0 0 2.6 1.3 1.3 0 0 0 0-2.6z',
    axe:'M4 19.6L16 7.6l1.4 1.4L5.4 21zM15 3c2.8 0 5 2.2 5 5 0 1.2-.4 2.3-1.1 3.2L11.8 4.1C12.7 3.4 13.8 3 15 3z',
    arrow:'M12 2.5l6.5 6.5H14.5v12h-5v-12H5.5z',
    key:'M15 2.5a6.5 6.5 0 0 0-6.2 8.5L2.5 17.3V21.5h4.2v-2.3h2.3v-2.3h2.1l1.1-1.1A6.5 6.5 0 1 0 15 2.5zm1.8 5.7a1.8 1.8 0 1 1 0-3.6 1.8 1.8 0 0 1 0 3.6z',
    chest:'M4 9h16v10a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1zm7 3v3h2v-3zM5 4h14a1 1 0 0 1 1 1v3H4V5a1 1 0 0 1 1-1z',
    potion:'M9 2.5h6v2h-1.5v3l3.4 6.4A3.4 3.4 0 0 1 14.5 19.5h-5A3.4 3.4 0 0 1 7.1 13.9l3.4-6.4v-3H9z',
    sun:'M12 7.5a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9zM11 2h2v3h-2zM11 19h2v3h-2zM2 11h3v2H2zM19 11h3v2h-3zM4.6 5.9l1.4-1.4 2.1 2.1-1.4 1.4zM15.9 17.2l1.4-1.4 2.1 2.1-1.4 1.4zM17.3 4.6l1.4 1.4-2.1 2.1-1.4-1.4zM6 15.9l1.4 1.4-2.1 2.1-1.4-1.4z',
    moon:'M13 2A10 10 0 1 0 22 15 8 8 0 0 1 13 2z',
    mountain:'M1 20L8 6l4.5 8.5L15.5 9 23 20z',
    target:'M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm0 3a7 7 0 1 1 0 14 7 7 0 0 1 0-14zm0 3.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z',
    flag:'M6 2h1.5v20H6zM8.5 3h11l-2.5 3.5L19.5 10h-11z',
    gear:'M9.6 2.5h4.8l.6 2.5 1.6.9 2.4-1 2.4 4.1-1.9 1.7v1.8l1.9 1.7-2.4 4.1-2.4-1-1.6.9-.6 2.5H9.6l-.6-2.5-1.6-.9-2.4 1-2.4-4.1 1.9-1.7v-1.8L2.6 9l2.4-4.1 2.4 1 1.6-.9zM12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z'
  };
  ICON_CATS = {
    Suits:['heart','spade','club','diamond'],
    Combat:['sword','shield','skull','bolt','axe','arrow'],
    Loot:['coin','gem','crown','key','chest','potion'],
    Nature:['flame','drop','leaf','sun','moon','mountain'],
    Symbols:['star','dice','target','flag','gear']
  };

  UICONS = {
    undo:'M9 14L4 9l5-5M4 9h11a5 5 0 0 1 0 10h-3',
    redo:'M15 14l5-5-5-5M20 9H9a5 5 0 0 0 0 10h3',
    plus:'M12 5v14M5 12h14',
    trash:'M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13',
    copy:'M9 9h10v10H9zM5 15H5V5h10',
    up:'M12 19V5M6 11l6-6 6 6',
    down:'M12 5v14M6 13l6 6 6-6',
    image:'M4 5h16v14H4zM4 15l4-4 4 4 3-3 5 5M8.5 9.5a1.2 1.2 0 1 0 .01 0',
    type:'M5 6V4h14v2M12 4v16M9 20h6',
    square:'M5 5h14v14H5z',
    circle:'M12 12m-8 0a8 8 0 1 0 16 0a8 8 0 1 0 -16 0',
    line:'M5 19L19 5',
    save:'M5 4h11l3 3v13H5zM8 4v5h7M8 14h8',
    folder:'M4 6h6l2 2h8v10H4z',
    download:'M12 4v11M7 11l5 5 5-5M5 20h14',
    grid:'M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z',
    eye:'M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12zM12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0',
    sliders:'M4 8h9M17 8h3M4 16h3M11 16h9M13 6v4M7 14v4',
    close:'M6 6l12 12M18 6L6 18',
    alignL:'M4 6h16M4 10h10M4 14h16M4 18h10',
    alignC:'M4 6h16M7 10h10M4 14h16M7 18h10',
    alignR:'M4 6h16M10 10h10M4 14h16M10 18h10',
    bold:'M7 5h6a3.4 3.4 0 0 1 0 7H7zM7 12h7a3.4 3.4 0 0 1 0 7H7z',
    rotate:'M3.5 12a8.5 8.5 0 1 1 2.2 5.7M3.5 17v-4h4',
    chev:'M6 9l6 6 6-6',
    layers:'M12 3l9 5-9 5-9-5zM3 13l9 5 9-5',
    cards:'M8 4h11a1 1 0 0 1 1 1v11M5 7h11a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1z',
    table:'M4 5h16v14H4zM4 10h16M4 15h16M9 5v14',
    paint:'M5 3h14v6H5zM7 9v8a2 2 0 0 0 2 2h2v-4h2v4h2a2 2 0 0 0 2-2V9',
    star:'M12 3.2l2.5 5.5 6 .6-4.5 4 1.3 5.9L12 16.9 6.2 19l1.3-5.9-4.5-4 6-.6z'
  };

  state = {
    theme:'studio', accent:'#10b981',
    cards:[], selCard:null, selEl:null, editEl:null,
    side:'front', back:null, duplexBacks:false,
    showBleed:true, showSafe:true, zoom:1,
    stageW:900, stageH:640,
    assets:[], dragOver:false,
    leftTab:'card', modal:null, batchText:'', toast:null,
    series:{ mode:'product', vars:[] },
    iconLib:{ cat:'Suits', mode:'insert' }
  };
  MAXDIM = 1600;

  componentDidMount(){
    const t = this.props.theme && this.THEMES[this.props.theme] ? this.props.theme : 'studio';
    const accent = this.props.accent || '#10b981';
    const cards = this.buildSample();
    this.setState({ theme:t, accent, cards, selCard:cards[0].id, selEl:null }, ()=>this.measure());
    this._mv = (e)=>this.onPointerMove(e);
    this._mu = (e)=>this.onPointerUp(e);
    this._rs = ()=>this.measure();
    this._kd = (e)=>this.onKey(e);
    window.addEventListener('pointermove', this._mv);
    window.addEventListener('pointerup', this._mu);
    window.addEventListener('resize', this._rs);
    window.addEventListener('keydown', this._kd);
  }
  componentWillUnmount(){
    window.removeEventListener('pointermove', this._mv);
    window.removeEventListener('pointerup', this._mu);
    window.removeEventListener('resize', this._rs);
    window.removeEventListener('keydown', this._kd);
  }
  componentDidUpdate(){
    if(this.state.editEl && this.state.editEl!==this.state.selEl){
      this.setState({ editEl:null });
    }
  }
  measure(){
    if(this.stageEl){ this.setState({ stageW:this.stageEl.clientWidth, stageH:this.stageEl.clientHeight }); }
  }
  onKey(e){
    const tag = (e.target && e.target.tagName) || '';
    if(tag==='INPUT' || tag==='TEXTAREA') return;
    const mod = e.metaKey || e.ctrlKey;
    if(mod && e.key.toLowerCase()==='z'){ e.preventDefault(); if(e.shiftKey) this.redo(); else this.undo(); }
    else if(mod && e.key.toLowerCase()==='y'){ e.preventDefault(); this.redo(); }
    else if(mod && e.key.toLowerCase()==='d'){ e.preventDefault(); this.dupEl(); }
    else if((e.key==='Enter'||e.key==='F2') && this.state.selEl && !this.state.editEl){ const el=this.curEl(); if(el && el.type==='text'){ e.preventDefault(); this.enterEdit(el); } }
    else if((e.key==='Delete'||e.key==='Backspace') && this.state.selEl){ e.preventDefault(); this.deleteEl(); }
  }

  th(){ return this.THEMES[this.state.theme]; }
  ac(){ return this.state.accent; }
  uid(){ this._n=(this._n||0)+1; return 'e'+this._n+'_'+Date.now().toString(36).slice(-4); }
  clone(x){ return JSON.parse(JSON.stringify(x)); }
  toast(m){ this.setState({toast:m}); clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:null}),1900); }
  isBack(){ return this.state.side==='back'; }
  frontCard(){ return this.state.cards.find(c=>c.id===this.state.selCard) || null; }
  curCard(){ return this.isBack() ? this.state.back : this.frontCard(); }
  curEl(){ const c=this.curCard(); if(!c) return null; return c.elements.find(e=>e.id===this.state.selEl) || null; }
  // Write the updated card object back to whichever side is on canvas.
  setCur(next, extra){
    if(this.isBack()) this.setState({ back:next, ...(extra||{}) });
    else this.setState({ cards:this.state.cards.map(c=>c.id===next.id?next:c), ...(extra||{}) });
  }
  // Default back: accent-colored solid with a centered white star (spec §1).
  defaultBack(ref){
    const w=ref?ref.w:this.TYPES.poker.w, h=ref?ref.h:this.TYPES.poker.h;
    return { name:'Card back', typeId:ref?ref.typeId:'poker', w, h,
      bg:{type:'solid', color:this.ac(), from:'#ffffff', to:'#dfe6ee', angle:135},
      border:{width:0, color:'#1c2230', radius:3},
      elements:[{ id:this.uid(), type:'icon', x:+(w/2-9).toFixed(1), y:+(h/2-9).toFixed(1), w:18, h:18, icon:'star', color:'#ffffff', rotation:0, opacity:1 }] };
  }
  flipSide(){
    const side = this.isBack() ? 'front' : 'back';
    this._hk=null; // break undo coalescing across sides
    const patch = { side, selEl:null, editEl:null };
    if(side==='back' && !this.state.back) patch.back=this.defaultBack(this.frontCard());
    this.setState(patch);
  }

  pushHistory(key){
    const now=Date.now();
    if(key && key===this._hk && now-(this._ht||0)<700){ this._ht=now; return; }
    this._hk=key; this._ht=now;
    this.history.past.push(this.clone({ cards:this.state.cards, back:this.state.back }));
    if(this.history.past.length>60) this.history.past.shift();
    this.history.future=[];
  }
  undo(){
    if(!this.history.past.length) return;
    this.history.future.push(this.clone({ cards:this.state.cards, back:this.state.back }));
    const snap=this.history.past.pop();
    this.setState({ cards:snap.cards, back:snap.back }, ()=>this.fixSel());
  }
  redo(){
    if(!this.history.future.length) return;
    this.history.past.push(this.clone({ cards:this.state.cards, back:this.state.back }));
    const snap=this.history.future.pop();
    this.setState({ cards:snap.cards, back:snap.back }, ()=>this.fixSel());
  }
  fixSel(){
    let { selCard, selEl, cards } = this.state;
    let c=cards.find(x=>x.id===selCard); if(!c){ c=cards[0]; selCard=c?c.id:null; }
    // Undoing past the first flip can restore back:null — fall to front view.
    const side = (this.state.side==='back' && !this.state.back) ? 'front' : this.state.side;
    const cur = side==='back' ? this.state.back : c;
    if(!cur || !cur.elements.find(e=>e.id===selEl)) selEl=null;
    this.setState({ selCard, selEl, side });
  }

  setCards(cards){ this.setState({ cards }); }
  patchCard(patch, hist){ const c=this.curCard(); if(!c) return; if(hist) this.pushHistory(hist); this.setCur({...c, ...patch}); }
  updateSelEl(patch, opts){
    opts=opts||{};
    const c=this.curCard(); if(!c) return;
    if(opts.hist!==false) this.pushHistory(opts.key||'edit');
    this.setCur({ ...c, elements:c.elements.map(e=> e.id!==this.state.selEl ? e : {...e,...patch}) });
  }
  enterEdit(el){
    if(!el || el.type!=='text') return;
    if(!this.curCard()) return;
    this._hk=null;
    this._focusEdit=true;
    this.setState({ selEl:el.id, editEl:el.id });
  }

  makeEl(type, c, extra){
    const cx=c.w/2, cy=c.h/2, A=this.ac();
    let base={ id:this.uid(), type, rotation:0, opacity:1 };
    if(type==='text') base={ ...base, x:cx-22, y:cy-7, w:44, h:14, text:'New text', font:"'Work Sans',sans-serif", size:4.2, weight:600, color:'#1c2230', align:'center', italic:false, lineH:1.2, letter:0 };
    if(type==='image') base={ ...base, x:cx-22, y:cy-22, w:44, h:44, src:null, fit:'cover', radius:1.5 };
    if(type==='icon') base={ ...base, x:cx-9, y:cy-9, w:18, h:18, icon:'star', color:A };
    if(type==='shape') base={ ...base, x:cx-16, y:cy-16, w:32, h:32, shape:'rect', fill:'#e8edf2', stroke:'#1c2230', strokeWidth:0, radius:2 };
    return { ...base, ...(extra||{}) };
  }
  addEl(type, extra){
    const c=this.curCard(); if(!c) return;
    this.pushHistory('add');
    const el=this.makeEl(type,c,extra);
    const editing = type==='text';
    if(editing){ this._focusEdit=true; this._selectNew=true; this._hk=null; }
    this.setCur({...c, elements:[...c.elements, el]}, { selEl:el.id, leftTab:'card', editEl: editing? el.id : null });
  }
  deleteEl(){
    const c=this.curCard(); if(!c||!this.state.selEl) return;
    this.pushHistory('del');
    this.setCur({...c, elements:c.elements.filter(e=>e.id!==this.state.selEl)}, { selEl:null });
  }
  dupEl(){
    const c=this.curCard(); const el=this.curEl(); if(!c||!el) return;
    this.pushHistory('dupel');
    const ne={...this.clone(el), id:this.uid(), x:el.x+4, y:el.y+4};
    const idx=c.elements.findIndex(e=>e.id===el.id);
    const els=[...c.elements]; els.splice(idx+1,0,ne);
    this.setCur({...c, elements:els}, { selEl:ne.id });
  }
  layer(dir){
    const c=this.curCard(); const el=this.curEl(); if(!c||!el) return;
    this.pushHistory('layer');
    let els=[...c.elements]; const i=els.findIndex(e=>e.id===el.id);
    els.splice(i,1);
    let j = dir==='front'?els.length : dir==='back'?0 : dir==='up'?Math.min(els.length,i+1) : Math.max(0,i-1);
    els.splice(j,0,el);
    this.setCur({...c, elements:els});
  }

  setType(id){
    const c=this.curCard(); if(!c) return;
    this.pushHistory('type');
    const t=this.TYPES[id];
    const patch = id==='custom' ? { typeId:id } : { typeId:id, w:t.w, h:t.h };
    this.patchCard(patch, null);
  }
  setBg(patch){ const c=this.curCard(); if(!c) return; this.patchCard({ bg:{...c.bg, ...patch} }, 'bg'); }
  setBorder(patch){ const c=this.curCard(); if(!c) return; this.patchCard({ border:{...c.border, ...patch} }, 'border'); }

  blankCard(typeId, w, h){
    const t=this.TYPES[typeId]||this.TYPES.poker;
    return { id:this.uid(), name:'Card', qty:1, typeId, w:w||t.w, h:h||t.h, bg:{type:'solid', color:'#ffffff', from:'#ffffff', to:'#dfe6ee', angle:135}, border:{width:0, color:'#1c2230', radius:3}, elements:[] };
  }
  addCard(){

    const c=this.blankCard(ref?ref.typeId:'poker', ref?ref.w:null, ref?ref.h:null);

  dupCard(){
    const c=this.curCard(); if(!c) return;
    this.pushHistory('dupcard');
    const nc={...this.clone(c), id:this.uid(), name:c.name+' copy'};
    nc.elements=nc.elements.map(e=>({...e,id:this.uid()}));
    const i=this.state.cards.findIndex(x=>x.id===c.id);

  delCard(id){

    const cards=this.state.cards.filter(c=>c.id!==id);

  moveCard(id, dir){

  }

  onElPointerDown(e, el){
    if(e.button!==0) return;
    if(this.state.editEl===el.id) return;
    e.stopPropagation();
    this.setState({ selEl:el.id });
    this.pushHistory('move_'+el.id);
    this.drag={ mode:'move', sx:e.clientX, sy:e.clientY, ox:el.x, oy:el.y };
  }
  onHandleDown(e, el, corner){
    e.stopPropagation(); e.preventDefault();
    this.setState({ selEl:el.id });
    this.pushHistory('resize_'+el.id);
    this.drag={ mode:'resize', corner, sx:e.clientX, sy:e.clientY, ox:el.x, oy:el.y, ow:el.w, oh:el.h };
  }
  onRotateDown(e, el){
    e.stopPropagation(); e.preventDefault();
    this.setState({ selEl:el.id });
    this.pushHistory('rotate_'+el.id);
    const r=this.faceEl.getBoundingClientRect();
    const s=this.scale, B=this.B;
    this.drag={ mode:'rotate', cx:r.left+(el.x+B+el.w/2)*s, cy:r.top+(el.y+B+el.h/2)*s };
  }
  onPointerMove(e){
    const d=this.drag; if(!d) return;
    const s=this.scale;
    if(d.mode==='move'){
      const dx=(e.clientX-d.sx)/s, dy=(e.clientY-d.sy)/s;
      this.updateSelEl({ x:+(d.ox+dx).toFixed(1), y:+(d.oy+dy).toFixed(1) }, {hist:false});
    } else if(d.mode==='resize'){
      let dx=(e.clientX-d.sx)/s, dy=(e.clientY-d.sy)/s;
      let x=d.ox,y=d.oy,w=d.ow,hh=d.oh;
      const cn=d.corner;
      if(cn.includes('e')) w=d.ow+dx;
      if(cn.includes('s')) hh=d.oh+dy;
      if(cn.includes('w')){ w=d.ow-dx; x=d.ox+dx; }
      if(cn.includes('n')){ hh=d.oh-dy; y=d.oy+dy; }
      if(w<4){ if(cn.includes('w')) x=d.ox+d.ow-4; w=4; }
      if(hh<4){ if(cn.includes('n')) y=d.oy+d.oh-4; hh=4; }
      this.updateSelEl({ x:+x.toFixed(1), y:+y.toFixed(1), w:+w.toFixed(1), h:+hh.toFixed(1) }, {hist:false});
    } else if(d.mode==='rotate'){
      let ang=Math.atan2(e.clientY-d.cy, e.clientX-d.cx)*180/Math.PI+90;
      if(e.shiftKey) ang=Math.round(ang/15)*15;
      this.updateSelEl({ rotation:Math.round(ang) }, {hist:false});
    }
  }
  onPointerUp(){ this.drag=null; }

  ensureImages(cards){
    const srcs=new Set();
    cards.forEach(c=>c.elements.forEach(e=>{ if(e.type==='image'&&e.src) srcs.add(e.src); }));
    const tasks=[...srcs].filter(s=>!this.imgCache[s]).map(s=>new Promise(res=>{
      const img=new Image(); img.crossOrigin='anonymous';
      img.onload=()=>{ this.imgCache[s]=img; res(); };
      img.onerror=()=>{ res(); };
      img.src=s;
    }));
    return Promise.all(tasks);
  }
  roundRectC(ctx,x,y,w,h,r){
    r=Math.max(0,Math.min(r,Math.min(w,h)/2));
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }
  wrapLines(ctx,text,maxW){
    const out=[];
    String(text).split('\n').forEach(para=>{
      const words=para.split(/\s+/); let cur='';
      words.forEach(w=>{
        const test=cur?cur+' '+w:w;
        if(cur && ctx.measureText(test).width>maxW){ out.push(cur); cur=w; } else cur=test;
      });
      out.push(cur);
    });
    return out;
  }
  drawCard(card, ppm){
    const B=this.B, W=card.w, H=card.h;
    const pw=Math.round((W+2*B)*ppm), ph=Math.round((H+2*B)*ppm);
    const cv=document.createElement('canvas'); cv.width=pw; cv.height=ph;
    const ctx=cv.getContext('2d');
    const rad=(card.border&&card.border.radius?card.border.radius:0)*ppm;
    ctx.save();
    if(card.bg.type==='gradient'){
      const a=(card.bg.angle||135)*Math.PI/180;
      const gx=Math.cos(a), gy=Math.sin(a);
      const g=ctx.createLinearGradient(pw/2-gx*pw/2, ph/2-gy*ph/2, pw/2+gx*pw/2, ph/2+gy*ph/2);
      g.addColorStop(0,card.bg.from); g.addColorStop(1,card.bg.to);
      ctx.fillStyle=g;
    } else if(card.bg.type==='none'){ ctx.fillStyle='#ffffff'; }
    else ctx.fillStyle=card.bg.color;
    ctx.fillRect(0,0,pw,ph);
    ctx.restore();
    card.elements.forEach(el=>{
      ctx.save();
      const ex=(el.x+B)*ppm, ey=(el.y+B)*ppm, ew=el.w*ppm, eh=el.h*ppm;
      const cx=ex+ew/2, cy=ey+eh/2;
      ctx.translate(cx,cy); ctx.rotate((el.rotation||0)*Math.PI/180); ctx.globalAlpha=el.opacity==null?1:el.opacity;
      const x0=-ew/2, y0=-eh/2;
      if(el.type==='text'){
        const fpx=el.size*ppm;
        ctx.font=`${el.italic?'italic ':''}${el.weight||400} ${fpx}px ${el.font}`;
        ctx.fillStyle=el.color; ctx.textBaseline='top';
        const lines=this.wrapLines(ctx,el.text,ew);
        const lh=fpx*(el.lineH||1.2);
        ctx.textAlign = el.align==='center'?'center':el.align==='right'?'right':'left';
        const tx = el.align==='center'?0 : el.align==='right'?ew/2 : -ew/2;
        lines.forEach((ln,i)=>{ ctx.fillText(ln, tx, y0+i*lh); });
      } else if(el.type==='image'){
        this.roundRectC(ctx,x0,y0,ew,eh,(el.radius||0)*ppm); ctx.clip();
        const img=this.imgCache[el.src];
        if(img && img.width){
          const ir=img.width/img.height, br=ew/eh; let dw,dh;
          if(el.fit==='contain'){ if(ir>br){dw=ew;dh=ew/ir;}else{dh=eh;dw=eh*ir;} }
          else { if(ir>br){dh=eh;dw=eh*ir;}else{dw=ew;dh=ew/ir;} }
          ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
        } else { ctx.fillStyle='#e9edf1'; ctx.fillRect(x0,y0,ew,eh); }
      } else if(el.type==='icon'){
        const d=this.ICONS[el.icon]; if(d){
          const sc=Math.min(ew,eh)/24;
          ctx.translate(-12*sc + (ew-24*sc)/2, -12*sc + (eh-24*sc)/2);
          ctx.scale(sc,sc); ctx.fillStyle=el.color;
          const p=new Path2D(d); ctx.fill(p,'evenodd');
        }
      } else if(el.type==='shape'){
        const sw=(el.strokeWidth||0)*ppm;
        if(el.shape==='circle'){
          ctx.beginPath(); ctx.ellipse(0,0,Math.max(0,ew/2-sw/2),Math.max(0,eh/2-sw/2),0,0,Math.PI*2);
          if(el.fill && el.fill!=='none'){ ctx.fillStyle=el.fill; ctx.fill(); }
          if(sw>0){ ctx.lineWidth=sw; ctx.strokeStyle=el.stroke; ctx.stroke(); }
        } else if(el.shape==='line'){
          ctx.beginPath(); ctx.moveTo(x0,0); ctx.lineTo(x0+ew,0);
          ctx.lineWidth=Math.max(sw, eh); ctx.strokeStyle=el.stroke||el.fill; ctx.lineCap='round'; ctx.stroke();
        } else {
          this.roundRectC(ctx,x0+sw/2,y0+sw/2,ew-sw,eh-sw,(el.radius||0)*ppm);
          if(el.fill && el.fill!=='none'){ ctx.fillStyle=el.fill; ctx.fill(); }
          if(sw>0){ ctx.lineWidth=sw; ctx.strokeStyle=el.stroke; ctx.stroke(); }
        }
      }
      ctx.restore();
    });
    if(card.border && card.border.width>0){
      ctx.save();
      this.roundRectC(ctx, B*ppm, B*ppm, W*ppm, H*ppm, rad);
      ctx.lineWidth=card.border.width*ppm; ctx.strokeStyle=card.border.color; ctx.stroke();
      ctx.restore();
    }
    return cv;
  }

  download(name, blob){
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
  }
  async exportPNG(all){
    const ppm=300/25.4;
    const cards = all ? this.state.cards : [this.curCard()].filter(Boolean);
    if(!cards.length) return;
    this.toast('Rendering PNG…');
    await this.ensureImages(cards);
    for(let i=0;i<cards.length;i++){
      const cv=this.drawCard(cards[i],ppm);
      await new Promise(res=>cv.toBlob(b=>{ this.download((cards[i].name||'card')+'.png', b); res(); },'image/png'));
      if(all) await new Promise(r=>setTimeout(r,250));
    }
    this.toast(all?'Exported '+cards.length+' PNGs':'PNG exported');
  }
  async exportPDF(pageId){
    if(!window.jspdf){ this.toast('PDF engine still loading…'); return; }
    const { jsPDF }=window.jspdf;
    const ppm=300/25.4, B=this.B;
    const pages={ letter:{w:215.9,h:279.4,fmt:'letter'}, a4:{w:210,h:297,fmt:'a4'} };
    const pg=pages[pageId]||pages.letter;
    const margin=8, mark=3.2, gap=0;
    this.toast('Building PDF…');
    await this.ensureImages(this.state.cards);
    const list=[];
    this.state.cards.forEach(c=>{ for(let q=0;q<(c.qty||1);q++) list.push(c); });
    if(!list.length){ this.toast('No cards'); return; }
    const pdf=new jsPDF({ unit:'mm', format:pg.fmt, orientation:'portrait' });
    let placed=0, first=true;
    let idx=0;
    while(idx<list.length){
      if(!first) pdf.addPage(pg.fmt,'portrait');
      first=false;
      let x=margin, y=margin, rowH=0;
      while(idx<list.length){
        const card=list[idx];
        const cw=card.w+2*B, ch=card.h+2*B;
        if(x+cw > pg.w-margin){ x=margin; y+=rowH+gap; rowH=0; }
        if(y+ch > pg.h-margin){ break; }
        const cv=this.drawCard(card,ppm);
        const data=cv.toDataURL('image/png');
        pdf.addImage(data,'PNG', x, y, cw, ch, undefined, 'FAST');
        pdf.setDrawColor(40); pdf.setLineWidth(0.15);
        const tx=x+B, ty=y+B, tr=x+B+card.w, tb=y+B+card.h;
        const m=mark;
        pdf.line(tx-m,ty, tx-0.5,ty); pdf.line(tx,ty-m, tx,ty-0.5);
        pdf.line(tr+0.5,ty, tr+m,ty); pdf.line(tr,ty-m, tr,ty-0.5);
        pdf.line(tx-m,tb, tx-0.5,tb); pdf.line(tx,tb+0.5, tx,tb+m);
        pdf.line(tr+0.5,tb, tr+m,tb); pdf.line(tr,tb+0.5, tr,tb+m);
        x+=cw+gap; rowH=Math.max(rowH,ch); idx++; placed++;
      }
    }
    pdf.save('card-deck-'+pageId+'.pdf');
    this.toast('PDF: '+placed+' cards exported');

  loadJSON(file){
    const r=new FileReader();
    r.onload=()=>{ try{
      const d=JSON.parse(r.result);
      if(!d.cards) throw 0;
      this.history={past:[],future:[]}; this.imgCache={};
      this.setState({ cards:d.cards, selCard:d.cards[0]&&d.cards[0].id, selEl:null, theme:d.theme||this.state.theme, accent:d.accent||this.state.accent, assets:Array.isArray(d.assets)?d.assets:[] });
      this.toast('Project loaded');
    }catch(e){ this.toast('Invalid project file'); } };
    r.readAsText(file);
  }
  // Read an image file, downscale oversized art (keeps saved JSON/PDF lean),
  // and hand back a data-URL plus its width/height aspect ratio.
  loadImageScaled(file, cb){
    const r=new FileReader();
    r.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const w=img.naturalWidth||1, hh=img.naturalHeight||1, ratio=w/hh;
        const scale=Math.min(1, this.MAXDIM/Math.max(w,hh));
        if(scale>=1){ cb(r.result, ratio); return; }
        const cw=Math.round(w*scale), ch=Math.round(hh*scale);
        const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
        cv.getContext('2d').drawImage(img,0,0,cw,ch);
        const keepAlpha=/png|gif|webp|svg/i.test(file.type);
        cb(cv.toDataURL(keepAlpha?'image/png':'image/jpeg', keepAlpha?undefined:0.9), ratio);
      };
      img.onerror=()=>this.toast('Could not read that image');
      img.src=r.result;
    };
    r.readAsDataURL(file);
  }
  // Import one file: replace the selected image, or drop a new one onto the card.
  importFile(file, opts){
    opts=opts||{};
    if(!file || !/^image\//.test(file.type)){ this.toast('Not an image file'); return; }
    this.loadImageScaled(file, (src,ratio)=>{
      this.addAsset(src, ratio);
      if(opts.replace){ this.updateSelEl({src},{key:'img'}); this.toast('Image replaced'); }
      else { this.placeImage(src, ratio, opts); this.toast('Image added'); }
    });
  }
  onUpload(file){ this.importFile(file, { replace: !!(this.curEl()&&this.curEl().type==='image') }); }
  // Add an image element sized to its aspect ratio, centred (or at a drop point).
  placeImage(src, ratio, opts){
    opts=opts||{};
    const c=this.curCard(); if(!c) return;
    ratio=ratio||1;
    let w=c.w*0.6, h=w/ratio; const maxH=c.h*0.6;
    if(h>maxH){ h=maxH; w=h*ratio; }
    w=+w.toFixed(1); h=+h.toFixed(1);
    let x=(opts.x!=null?opts.x:c.w/2)-w/2, y=(opts.y!=null?opts.y:c.h/2)-h/2;
    x=+Math.max(0,Math.min(c.w-w,x)).toFixed(1);
    y=+Math.max(0,Math.min(c.h-h,y)).toFixed(1);
    this.addEl('image',{src,w,h,x,y,fit:'cover'});
  }
  addAsset(src, ratio){

  canvasDrop(e){
    e.preventDefault(); this.setState({dragOver:false});
    const files=(e.dataTransfer&&e.dataTransfer.files)?[...e.dataTransfer.files]:[];
    const imgs=files.filter(f=>/^image\//.test(f.type));
    if(!imgs.length) return;
    const r=this.faceEl&&this.faceEl.getBoundingClientRect();
    let pos={};
    if(r){ const s=this.scale, B=this.B; pos={ x:(e.clientX-r.left)/s-B, y:(e.clientY-r.top)/s-B }; }
    imgs.forEach((f,i)=>this.importFile(f, i===0?pos:{}));
  }

  batchGenerate(){
    const c=this.curCard(); if(!c){ this.toast('Select a base card'); return; }
    const txt=this.state.batchText.trim(); if(!txt){ this.toast('Paste a data table first'); return; }
    const lines=txt.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){ this.toast('Need a header row + 1+ data rows'); return; }
    const delim = lines[0].indexOf('\t')>=0 ? '\t' : ',';
    const headers=lines[0].split(delim).map(s=>s.trim());
    this.pushHistory('batch');
    const newCards=[];
    for(let i=1;i<lines.length;i++){
      const cells=lines[i].split(delim);
      const row={}; headers.forEach((hh,j)=>row[hh]=(cells[j]||'').trim());
      const nc=this.clone(c); nc.id=this.uid(); nc.name=row[headers[0]]||('Card '+i); nc.qty=row.qty?parseInt(row.qty)||1:1;
      nc.elements=nc.elements.map(e=>{
        const ne={...e, id:this.uid()};
        if(ne.type==='text' && typeof ne.text==='string'){
          ne.text=ne.text.replace(/\{\{\s*([\w]+)\s*\}\}/g,(m,k)=> row[k]!==undefined?row[k]:m);
        }
        if(ne.type==='image' && typeof ne.src==='string'){
          const mm=ne.src.match(/^\{\{\s*([\w]+)\s*\}\}$/); if(mm && row[mm[1]]) ne.src=row[mm[1]];
        }
        return ne;
      });
      newCards.push(nc);
    }
    this.setState({ cards:[...this.state.cards, ...newCards], modal:null });
    this.toast('Generated '+newCards.length+' cards');
  }

  seriesTargets(){
    const c=this.curCard(); if(!c) return [];
    const out=[];
    c.elements.forEach(e=>{
      if(e.type==='text'){ const snip=(e.text||'').replace(/\s+/g,' ').slice(0,16); out.push({elId:e.id,label:'Text · "'+snip+'"',props:[{prop:'text',label:'Number/Text'},{prop:'color',label:'Color'}]}); }

  addSeriesVar(elId, prop){
    const c=this.curCard(); if(!c) return;
    let list=[];
    if(elId==='bg'){ list=[(c.bg&&c.bg.color)||'#ffffff']; }
    else {
      const el=c.elements.find(e=>e.id===elId); if(!el) return;
      if(prop==='icon') list=[el.icon].filter(Boolean);
      else if(prop==='color') list=[el.color].filter(Boolean);
      else if(prop==='fill') list=[el.fill].filter(Boolean);
    }
    const v={ id:this.uid(), elId, prop, valueMode: prop==='text'?'range':'list', from:1, to:5, step:1, list };
    this.setState({ series:{...this.state.series, vars:[...this.state.series.vars, v]} });
  }
  updateSeriesVar(id, patch){
    const vars=this.state.series.vars.map(v=>v.id!==id?v:{...v,...patch});
    this.setState({ series:{...this.state.series, vars} });
  }
  removeSeriesVar(id){
    const vars=this.state.series.vars.filter(v=>v.id!==id);
    this.setState({ series:{...this.state.series, vars} });
  }
  resolveVar(v){
    if(v.prop==='text' && v.valueMode==='range'){
      const step=Math.abs(+v.step); if(!(step>0)) return [];
      const out=[]; const from=+v.from, to=+v.to;
      if(to>=from){ for(let n=from;n<=to+1e-9;n+=step){ out.push(String(+n.toFixed(4))); if(out.length>=500) break; } }
      else { for(let n=from;n>=to-1e-9;n-=step){ out.push(String(+n.toFixed(4))); if(out.length>=500) break; } }
      return out;
    }
    return (v.list||[]).map(x=>String(x)).filter(x=>x.length>0);
  }
  seriesCount(){
    const arrs=this.state.series.vars.map(v=>this.resolveVar(v)).filter(a=>a.length);
    if(!arrs.length) return 0;
    if(this.state.series.mode==='product') return arrs.reduce((n,a)=>n*a.length,1);
    return arrs.reduce((m,a)=>Math.max(m,a.length),0);
  }
  seriesGenerate(){
    const c=this.curCard(); if(!c){ this.toast('Select a base card'); return; }
    const vars=this.state.series.vars;
    const arrs=vars.map(v=>({v,vals:this.resolveVar(v)})).filter(o=>o.vals.length);
    if(!arrs.length){ this.toast('Add at least one variable with values'); return; }
    const mode=this.state.series.mode;
    const N = mode==='product' ? arrs.reduce((n,o)=>n*o.vals.length,1) : arrs.reduce((m,o)=>Math.max(m,o.vals.length),0);
    if(N>150){ this.toast('Too many cards ('+N+') — narrow the ranges'); return; }
    this.pushHistory('series');
    const textArr=arrs.find(o=>o.v.prop==='text');
    const newCards=[];
    for(let i=0;i<N;i++){
      const valById={}; let acc=i;
      arrs.forEach(o=>{ let vi; if(mode==='product'){ vi=acc % o.vals.length; acc=Math.floor(acc/o.vals.length); } else { vi=i % o.vals.length; } valById[o.v.id]=o.vals[vi]; });
      const nc=this.clone(c); nc.id=this.uid(); nc.qty=1;
      nc.name = textArr ? String(valById[textArr.v.id]) : (c.name+' '+(i+1));
      nc.elements = nc.elements.map(e=>{ const ne={...e, id:this.uid()}; vars.forEach(v=>{ if(v.elId===e.id && valById[v.id]!==undefined) ne[v.prop]=valById[v.id]; }); return ne; });
      vars.forEach(v=>{ if(v.elId==='bg' && valById[v.id]!==undefined) nc.bg={...nc.bg, type:'solid', color:valById[v.id]}; });
      newCards.push(nc);
    }
    this.setState({ cards:[...this.state.cards, ...newCards], modal:null });
    this.toast('Generated '+N+' cards');
  }

        onDragLeave:e=>{ if(e.target===e.currentTarget) this.setState({dragOver:false}); },
        onDrop:e=>this.canvasDrop(e),
        style:{flex:1,overflow:'auto',display:'flex',alignItems:'center',justifyContent:'center',padding:40}},
        c? h('div',{style:{boxShadow:'0 12px 40px rgba(0,0,0,.22)',borderRadius:3}}, this.renderFace(c,s,true)) : null),
      this.state.dragOver?h('div',{style:{position:'absolute',inset:0,zIndex:5,pointerEvents:'none',display:'flex',alignItems:'center',justifyContent:'center',border:'2.5px dashed '+this.ac(),borderRadius:4,background:this.ac()+'10'}},
        h('div',{style:{background:t.panel,color:t.text,padding:'10px 18px',borderRadius:10,fontWeight:700,fontSize:13,boxShadow:t.shadow}},'Drop image to add')):null,
      h('div',{style:{position:'absolute',bottom:16,left:'50%',transform:'translateX(-50%)',zIndex:4,display:'flex',alignItems:'center',gap:2,background:t.panel,border:'1px solid '+t.border,borderRadius:10,padding:'4px 6px',boxShadow:t.shadow}},
        zb('−',()=>this.setState({zoom:Math.max(.3,+(this.state.zoom-.15).toFixed(2))}),'Zoom out'),
        h('button',{onClick:()=>this.setState({zoom:1}),style:{minWidth:52,textAlign:'center',border:'none',background:'transparent',color:t.text,cursor:'pointer',fontSize:12,fontWeight:700}},Math.round(this.state.zoom*100)+'%'),
        zb('+',()=>this.setState({zoom:Math.min(3,+(this.state.zoom+.15).toFixed(2))}),'Zoom in')),
      this.state.selEl?h('div',{style:{position:'absolute',bottom:16,right:18,zIndex:4,fontSize:11,color:t.sub,background:t.panel,border:'1px solid '+t.border,borderRadius:8,padding:'6px 10px',boxShadow:t.shadow}},'Drag to move · corners resize · ⌫ delete'):null);
  }

  fitScale(c){
    if(!c) return 3;
    const availW=Math.max(120,this.state.stageW-90), availH=Math.max(120,this.state.stageH-90);
    const sW=availW/(c.w+2*this.B), sH=availH/(c.h+2*this.B);
    return Math.min(sW,sH);
  }

  renderModal(){
    if(this.state.modal!=='batch') return null;
    const t=this.th(), h=this.h, A=this.ac(), c=this.curCard();
    const fields=new Set();
    if(c) c.elements.forEach(e=>{
      const str = e.type==='text'?e.text : e.type==='image'?e.src:'';
      if(typeof str==='string'){ const m=str.match(/\{\{\s*\w+\s*\}\}/g); if(m) m.forEach(x=>fields.add(x.replace(/[{}\s]/g,''))); }
    });
    const example = 'name,cost,text,qty\nFire Imp,2,Deal 2 damage,3\nFrost Wisp,1,Freeze a target,2';
    return h('div',{style:{position:'fixed',inset:0,background:'rgba(15,20,18,.5)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:24},onClick:()=>this.setState({modal:null})},
      h('div',{onClick:e=>e.stopPropagation(),style:{width:560,maxWidth:'100%',background:t.panel,borderRadius:16,boxShadow:'0 30px 80px rgba(0,0,0,.4)',overflow:'hidden',border:'1px solid '+t.border}},
        h('div',{style:{padding:'18px 22px',borderBottom:'1px solid '+t.border,display:'flex',alignItems:'center',gap:10}},
          h('div',{style:{width:34,height:34,borderRadius:9,background:A+'18',color:A,display:'flex',alignItems:'center',justifyContent:'center'}},this.uIcon('table',18,'currentColor')),
          h('div',{style:{flex:1}},
            h('div',{style:{fontWeight:800,fontSize:16,color:t.text}},'Batch generate from data'),
            h('div',{style:{fontSize:12,color:t.sub,marginTop:1}},'Each row becomes one card, using "'+(c?c.name:'this card')+'" as the layout')),
          h('button',{onClick:()=>this.setState({modal:null}),style:{border:'none',background:'transparent',color:t.sub,cursor:'pointer',padding:4}},this.uIcon('close',20,'currentColor'))),
        h('div',{style:{padding:'18px 22px'}},
          h('div',{style:{fontSize:12.5,color:t.sub,lineHeight:1.5,marginBottom:12}},
            'Put ',h('code',{style:{background:t.input,padding:'1px 5px',borderRadius:4,color:A,fontSize:12}},'{{field}}'),
            ' placeholders into any text or image element on the base card, then paste a CSV / tab table below. The first column names the card; a ',h('code',{style:{background:t.input,padding:'1px 5px',borderRadius:4,color:t.text,fontSize:12}},'qty'),' column sets print count.'),
          fields.size?h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}},
            h('span',{style:{fontSize:11.5,color:t.faint,fontWeight:600,alignSelf:'center'}},'Detected fields:'),
            [...fields].map(f=>h('span',{key:f,style:{fontSize:11.5,fontWeight:700,color:A,background:A+'14',padding:'3px 9px',borderRadius:6}},'{{'+f+'}}'))
          ):h('div',{style:{fontSize:11.5,color:'#d08a3a',background:'#d08a3a18',padding:'8px 11px',borderRadius:8,marginBottom:12}},'Tip: add {{name}} style placeholders to the base card first, then they\'ll be filled per row.'),
          h('textarea',{value:this.state.batchText,placeholder:example,onChange:e=>this.setState({batchText:e.target.value}),
            style:{width:'100%',height:150,background:t.input,border:'1px solid '+t.border,borderRadius:10,padding:'12px',fontSize:12.5,fontFamily:"'Space Mono',monospace",color:t.text,resize:'vertical',lineHeight:1.5}}),
          h('div',{style:{display:'flex',gap:10,marginTop:16,justifyContent:'flex-end'}},
            h('button',{onClick:()=>this.setState({batchText:example}),style:{padding:'9px 14px',borderRadius:9,border:'1px solid '+t.border,background:t.panel2,color:t.sub,cursor:'pointer',fontSize:13,fontWeight:600}},'Load example'),
            h('button',{onClick:()=>this.setState({modal:null}),style:{padding:'9px 14px',borderRadius:9,border:'1px solid '+t.border,background:t.panel,color:t.text,cursor:'pointer',fontSize:13,fontWeight:600}},'Cancel'),
            h('button',{onClick:()=>this.batchGenerate(),style:{padding:'9px 18px',borderRadius:9,border:'none',background:A,color:'#fff',cursor:'pointer',fontSize:13,fontWeight:700}},'Generate deck')))));
  }

  openIconLib(mode){
    this.setState({ modal:'iconlib', iconLib:{ ...this.state.iconLib, mode } });
  }
  pickIcon(name){
    if(this.state.iconLib.mode==='swap' && this.curEl()){ this.updateSelEl({icon:name},{key:'icon'}); }
    else { this.addEl('icon',{icon:name}); }
    this.setState({ modal:null });
  }
  renderIconLib(){
    if(this.state.modal!=='iconlib') return null;
    const t=this.th(), h=this.h, A=this.ac();
    const IL=this.state.iconLib;
    const cats=Object.keys(this.ICON_CATS);
    const cat=this.ICON_CATS[IL.cat]?IL.cat:cats[0];
    const tabBtn=(cn)=>h('button',{key:cn,onClick:()=>this.setState({iconLib:{...IL,cat:cn}}),
      style:{padding:'6px 12px',borderRadius:8,border:'1px solid '+(cat===cn?A:t.border),background:cat===cn?A:t.panel,color:cat===cn?'#fff':t.text,cursor:'pointer',fontSize:12,fontWeight:700,whiteSpace:'nowrap'}},cn);
    const grid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8}},
      this.ICON_CATS[cat].map(k=>h('button',{key:k,onClick:()=>this.pickIcon(k),title:k,
        style:{aspectRatio:'1',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:10,cursor:'pointer',border:'1px solid '+t.border,background:t.input,color:t.text,transition:'all .12s'},
        onMouseEnter:e=>{e.currentTarget.style.borderColor=A;e.currentTarget.style.color=A;e.currentTarget.style.background=A+'12';},
        onMouseLeave:e=>{e.currentTarget.style.borderColor=t.border;e.currentTarget.style.color=t.text;e.currentTarget.style.background=t.input;}},
        this.gIcon(k,26,'currentColor'))));
    return h('div',{style:{position:'fixed',inset:0,background:'rgba(15,20,18,.5)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:24},onClick:()=>this.setState({modal:null})},
      h('div',{onClick:e=>e.stopPropagation(),style:{width:520,maxWidth:'100%',maxHeight:'90vh',display:'flex',flexDirection:'column',background:t.panel,borderRadius:16,boxShadow:'0 30px 80px rgba(0,0,0,.4)',overflow:'hidden',border:'1px solid '+t.border}},
        h('div',{style:{padding:'18px 22px',borderBottom:'1px solid '+t.border,display:'flex',alignItems:'center',gap:10}},
          h('div',{style:{width:34,height:34,borderRadius:9,background:A+'18',color:A,display:'flex',alignItems:'center',justifyContent:'center'}},this.uIcon('star',18,'currentColor')),
          h('div',{style:{flex:1}},
            h('div',{style:{fontWeight:800,fontSize:16,color:t.text}},'Icon library'),
            h('div',{style:{fontSize:12,color:t.sub,marginTop:1}}, IL.mode==='swap'?'Pick an icon to replace the selected one':'Pick an icon to add to the card')),
          h('button',{onClick:()=>this.setState({modal:null}),style:{border:'none',background:'transparent',color:t.sub,cursor:'pointer',padding:4}},this.uIcon('close',20,'currentColor'))),
        h('div',{style:{padding:'14px 22px 4px',display:'flex',gap:6,flexWrap:'wrap'}},cats.map(tabBtn)),
        h('div',{style:{padding:'14px 22px 22px',overflowY:'auto',flex:1}},grid)));
  }
  renderSeriesModal(){
    if(this.state.modal!=='series') return null;
    const t=this.th(), h=this.h, A=this.ac(), c=this.curCard();
    const S=this.state.series;
    const targets=this.seriesTargets();
    const N=this.seriesCount();
    const over=N>150;
    const varLabel=(v)=>{ const tg=targets.find(x=>x.elId===v.elId); const p=tg&&tg.props.find(pp=>pp.prop===v.prop); return (tg?tg.label:v.elId)+' → '+(p?p.label:v.prop); };
    const modeBtn=(m,label)=>h('button',{key:m,onClick:()=>this.setState({series:{...S,mode:m}}),
      style:{padding:'5px 12px',borderRadius:7,border:'1px solid '+(S.mode===m?A:t.border),background:S.mode===m?A:t.panel,color:S.mode===m?'#fff':t.text,cursor:'pointer',fontSize:12,fontWeight:700}},label);
    const addOptions=[]; targets.forEach(tg=>tg.props.forEach(p=>addOptions.push({elId:tg.elId,prop:p.prop,label:tg.label+' → '+p.label})));
    const addSelect=h('select',{value:'',onChange:e=>{ const val=e.target.value; if(!val) return; const parts=val.split('|'); this.addSeriesVar(parts[0],parts[1]); },
      style:{background:t.input,border:'1px solid '+t.border,borderRadius:8,padding:'7px 10px',fontSize:12.5,color:t.text,cursor:'pointer',fontWeight:600}},
      [h('option',{key:'_',value:''},'+ Add variable'), ...addOptions.map((o,k)=>h('option',{key:k,value:o.elId+'|'+o.prop},o.label))]);
    const varEditor=(v)=>{
      let editor;
      if(v.prop==='text'){
        const seg=h('div',{style:{display:'flex',gap:6,marginBottom:8}},
          ['range','list'].map(mm=>h('button',{key:mm,onClick:()=>this.updateSeriesVar(v.id,{valueMode:mm}),
            style:{padding:'4px 10px',borderRadius:6,border:'1px solid '+(v.valueMode===mm?A:t.border),background:v.valueMode===mm?A+'18':t.panel,color:v.valueMode===mm?A:t.sub,cursor:'pointer',fontSize:11.5,fontWeight:700}},mm==='range'?'Range':'List')));
        const body = v.valueMode==='range'
          ? h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
              h('div',{style:{flex:1}},this.field('From',this.numInput(v.from,x=>{ if(!isNaN(x)) this.updateSeriesVar(v.id,{from:x}); },{step:1}))),
              h('div',{style:{flex:1}},this.field('To',this.numInput(v.to,x=>{ if(!isNaN(x)) this.updateSeriesVar(v.id,{to:x}); },{step:1}))),
              h('div',{style:{flex:1}},this.field('Step',this.numInput(v.step,x=>{ if(!isNaN(x)) this.updateSeriesVar(v.id,{step:x}); },{step:1,min:0}))))
          : this.textInput(v.list.join(', '),x=>this.updateSeriesVar(v.id,{list:x.split(',').map(s=>s.trim()).filter(Boolean)}),{ph:'e.g. A, K, Q, J'});
        editor=h('div',{},seg,body);
      } else if(v.prop==='icon'){
        editor=h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
          Object.keys(this.ICONS).map(k=>{ const on=v.list.indexOf(k)>=0;
            return h('button',{key:k,title:k,onClick:()=>this.updateSeriesVar(v.id,{list: on? v.list.filter(x=>x!==k) : [...v.list,k]}),
              style:{width:34,height:34,borderRadius:8,border:'1.5px solid '+(on?A:t.border),background:on?A+'18':t.input,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',padding:0}},
              this.gIcon(k,20,on?A:t.sub)); }));
      } else {
        editor=h('div',{style:{display:'flex',flexWrap:'wrap',gap:6,alignItems:'center'}},
          v.list.map((col,ci)=>h('div',{key:ci,style:{display:'flex',alignItems:'center',gap:5,background:t.input,border:'1px solid '+t.border,borderRadius:7,padding:'3px 7px'}},
            h('span',{style:{width:14,height:14,borderRadius:4,background:col,border:'1px solid '+t.border}}),
            h('span',{style:{fontSize:11,color:t.text}},col),
            h('button',{onClick:()=>this.updateSeriesVar(v.id,{list:v.list.filter((_,x)=>x!==ci)}),style:{border:'none',background:'transparent',color:t.faint,cursor:'pointer',padding:0,fontSize:14,lineHeight:1}},'×'))),
          h('label',{style:{display:'inline-flex',alignItems:'center',gap:4,cursor:'pointer',fontSize:11.5,color:A,fontWeight:700,border:'1px dashed '+A,borderRadius:7,padding:'4px 8px',position:'relative'}},
            '+ color',
            h('input',{type:'color',onBlur:e=>this.updateSeriesVar(v.id,{list:[...v.list,e.target.value]}),style:{width:0,height:0,opacity:0,position:'absolute',pointerEvents:'none'}})));
      }
      const vals=this.resolveVar(v);
      return h('div',{key:v.id,style:{border:'1px solid '+t.border,borderRadius:12,padding:'12px',marginBottom:10,background:t.panel2}},
        h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:10}},
          h('div',{style:{fontSize:12.5,fontWeight:700,color:t.text,flex:1}},varLabel(v)),
          h('button',{onClick:()=>this.removeSeriesVar(v.id),title:'Remove',style:{border:'none',background:'transparent',color:t.faint,cursor:'pointer',padding:2,display:'flex'}},this.uIcon('trash',15,'currentColor'))),
        editor,
        h('div',{style:{fontSize:11,color:t.faint,marginTop:9}},'values: '+(vals.length? vals.slice(0,24).join(', ')+(vals.length>24?' …':'') : '—')));
    };
    return h('div',{style:{position:'fixed',inset:0,background:'rgba(15,20,18,.5)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:24},onClick:()=>this.setState({modal:null})},
      h('div',{onClick:e=>e.stopPropagation(),style:{width:600,maxWidth:'100%',maxHeight:'90vh',display:'flex',flexDirection:'column',background:t.panel,borderRadius:16,boxShadow:'0 30px 80px rgba(0,0,0,.4)',overflow:'hidden',border:'1px solid '+t.border}},
        h('div',{style:{padding:'18px 22px',borderBottom:'1px solid '+t.border,display:'flex',alignItems:'center',gap:10}},
          h('div',{style:{width:34,height:34,borderRadius:9,background:A+'18',color:A,display:'flex',alignItems:'center',justifyContent:'center'}},this.uIcon('grid',18,'currentColor')),
          h('div',{style:{flex:1}},
            h('div',{style:{fontWeight:800,fontSize:16,color:t.text}},'Generate series'),
            h('div',{style:{fontSize:12,color:t.sub,marginTop:1}},'Vary properties of "'+(c?c.name:'this card')+'" across a range or list')),
          h('div',{style:{display:'flex',gap:6,marginRight:8}},modeBtn('product','All combos'),modeBtn('zip','Parallel')),
          h('button',{onClick:()=>this.setState({modal:null}),style:{border:'none',background:'transparent',color:t.sub,cursor:'pointer',padding:4}},this.uIcon('close',20,'currentColor'))),
        h('div',{style:{padding:'16px 22px',overflowY:'auto',flex:1}},
          h('div',{style:{fontSize:12,color:t.sub,background:t.input,borderRadius:9,padding:'9px 12px',marginBottom:14,lineHeight:1.45}},
            S.mode==='product'
              ? h('span',{},h('b',{style:{color:t.text}},'All combinations'),' — every value of each variable is crossed with every other (A × B). 4 icons × 13 numbers = 52 cards.')
              : h('span',{},h('b',{style:{color:t.text}},'Parallel'),' — variables advance together, position by position (A₁+B₁, A₂+B₂ …). 4 icons + 13 numbers = 13 cards.')),
          h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:12}},
            h('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'.9px',textTransform:'uppercase',color:t.sub,flex:1}},'Variables'),
            addSelect),
          S.vars.length? S.vars.map(varEditor)
            : h('div',{style:{fontSize:12.5,color:t.sub,background:t.input,borderRadius:10,padding:'14px',textAlign:'center'}},'Add a variable to vary a number, icon, or color across the deck.')),
        h('div',{style:{padding:'14px 22px',borderTop:'1px solid '+t.border,display:'flex',alignItems:'center',gap:12}},
          h('div',{style:{flex:1,fontSize:13,fontWeight:700,color:over?'#d0432f':t.text}}, over? ('Too many cards ('+N+') — max 150') : ('→ '+N+' card'+(N===1?'':'s')+' will be generated')),
          h('button',{onClick:()=>this.setState({modal:null}),style:{padding:'9px 14px',borderRadius:9,border:'1px solid '+t.border,background:t.panel,color:t.text,cursor:'pointer',fontSize:13,fontWeight:600}},'Cancel'),
          h('button',{onClick:()=>this.seriesGenerate(),disabled:N===0||over,style:{padding:'9px 18px',borderRadius:9,border:'none',background:(N===0||over)?t.border:A,color:'#fff',cursor:(N===0||over)?'default':'pointer',fontSize:13,fontWeight:700,opacity:(N===0||over)? .6:1}},'Generate'))));
  }

  render(){
    const h=this.h, t=this.th();
    if(!this.state.cards.length) return h('div',{className:'cmsplash',style:{background:t?t.bg:'#eee'}},'CardSmith');
    return h('div',{style:{display:'flex',flexDirection:'column',height:'100vh',background:t.bg,color:t.text,fontFamily:"'Plus Jakarta Sans',sans-serif"}},
      this.renderHeader(),
      h('div',{style:{flex:1,display:'flex',minHeight:0}},
        this.renderLeftPanel(),
        this.renderCanvas(),
        this.renderRightPanel()),
      this.renderModal(),
      this.renderSeriesModal(),
      this.renderIconLib(),
      this.state.toast?h('div',{style:{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:60,background:'#1d2a24',color:'#fff',padding:'10px 18px',borderRadius:10,fontSize:13,fontWeight:600,boxShadow:'0 8px 30px rgba(0,0,0,.3)'}},this.state.toast):null);
  }
}

const rootEl = document.getElementById('root');
if (ReactDOM.createRoot) {
  ReactDOM.createRoot(rootEl).render(React.createElement(CardMaker));
} else {
  ReactDOM.render(React.createElement(CardMaker), rootEl);
}
</script>
</body>
</html>
